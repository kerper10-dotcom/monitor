name: Njuskalo Monitor

# Public repo = unlimited free Actions minutes. Secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run monitor
        env:
          TZ: Europe/Zagreb
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit DB and saved_ads changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add njuskalo.db saved_ads.json
          if ! git diff --staged --quiet; then
            git commit -m "Update njuskalo.db and saved_ads.json [skip ci]"
            git push
          else
            echo "No DB/saved_ads changes to commit"
          fi
